<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legu</title>
    <link rel="icon" id="favicon" href="">
    <style id="dynamic-styles">
        body { opacity: 0; transition: opacity 0.3s ease; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: url('/img/legu-rs-bg.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            font-family: var(--font-name), sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 3rem 1rem;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        canvas#particles {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        .glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 55vw; height: 55vw;
            background: radial-gradient(circle, var(--glow-color), transparent 75%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 2;
        }

        main { text-align: center; padding: 3rem 2rem; z-index: 3; position: relative; }

        .brand {
            font-size: 5rem;
            color: var(--primary);
            letter-spacing: -0.03em;
            text-transform: lowercase;
            filter: drop-shadow(0 0 18px var(--shadow-color));
            margin-bottom: 1.2rem;
        }

        .status {
            font-size: 1.25rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .status::after {
            content: "";
            display: inline-block;
            width: 11px; height: 11px;
            background: var(--primary-dim);
            border-radius: 50%;
            margin-left: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; }
        }

        .buttons { display: flex; gap: 1.6rem; justify-content: center; margin-bottom: 3.5rem; flex-wrap: wrap;}

        .btn {
            background: var(--btn);
            color: var(--text);
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.25rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
        }

        footer {
            position: absolute;
            bottom: 2.5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.6;
            z-index: 3;
        }

        .credits { font-weight: 600; margin-bottom: 0.6rem; font-size: 1.1rem; }
        .links { display: flex; gap: 2rem; justify-content: center; }

        a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
            transition: all 0.2s ease;
        }

        a:hover {
            color: var(--primary);
            border-bottom: 1px solid var(--primary);
        }

        @media (max-width: 600px) {
            .brand { font-size: 3.8rem; }
            .status { font-size: 1rem; }
            .btn { font-size: 1.1rem; padding: 0.9rem 1.6rem; }
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>
    <div class="glow"></div>

    <main>
        <h1 class="brand" id="site-name">...</h1>
        <p class="status" id="status-text">...</p>

        <div class="buttons">
            <a class="btn" href="/tools/index.html">Tools</a>
            <a class="btn" href="/jugar/index.html">Games</a>
            <a class="btn" href="https://govt.hu">Qw Falcon</a>
            <a class="btn" href="https://github.io">Qw Kite</a>
            <a class="btn" href="https://zya.me">JerJugar</a>
        </div>
    </main>

    <footer>
        <div class="credits" id="author">...</div>
        <div class="links">
            <a href="https://github.com" target="_blank">Github</a>
            <a href="mailto:cute.angryduck@gmail.com">Email</a>
        </div>
    </footer>

    <script>
        async function init() {
            const res = await fetch('/settings.json');
            const cfg = await res.json();

            const root = document.documentElement;
            root.style.setProperty('--bg', cfg.colors.background);
            root.style.setProperty('--surface', cfg.colors.surface);
            root.style.setProperty('--primary', cfg.colors.primary);
            root.style.setProperty('--primary-dim', cfg.colors.primaryDim);
            root.style.setProperty('--text', cfg.colors.text);
            root.style.setProperty('--text-dim', cfg.colors.textDim);
            root.style.setProperty('--btn', cfg.colors.button);
            root.style.setProperty('--btn-hover', cfg.colors.buttonHover);
            root.style.setProperty('--glow-color', cfg.colors.glow);
            root.style.setProperty('--shadow-color', cfg.colors.shadow);
            root.style.setProperty('--font-name', cfg.font.name);

            const fontStyle = document.createElement('style');
            fontStyle.appendChild(document.createTextNode(`
                @font-face {
                    font-family: "${cfg.font.name}";
                    src: url("${cfg.font.path}") format("${cfg.font.type}");
                }
            `));
            document.head.appendChild(fontStyle);

            document.getElementById('site-name').innerText = cfg.content.siteName;
            document.getElementById('status-text').innerText = cfg.content.status;
            document.getElementById('author').innerText = cfg.content.author;
            document.getElementById('favicon').href = cfg.content.favicon;
            document.title = cfg.content.siteName;

            document.body.style.opacity = "1";
            startParticles(cfg.colors.primary);
        }

        function startParticles(color) {
            const canvas = document.getElementById("particles");
            const ctx = canvas.getContext("2d");
            let w, h;
            const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
            window.addEventListener("resize", resize);
            resize();

            const particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    size: Math.random() * 2 + 1,
                    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4
                });
            }

            const mouse = { x: null, y: null };
            document.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });

            const draw = () => {
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 8;
                for (let p of particles) {
                    const dx = p.x - mouse.x, dy = p.y - mouse.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 120) { p.x += dx / dist * 0.6; p.y += dy / dist * 0.6; }
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                }
                requestAnimationFrame(draw);
            };
            draw();
        }

        init();
    </script>
</body>
</html>
