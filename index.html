<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legu</title>
    <link rel="icon" href="https://legu.veho.com.au/legu-rs.png">

    <style>
        @font-face {
            font-family: "AliceHand";
            src: url("https://legu.veho.com.au/fonts/alicehandwriting.ttf") format("truetype");
        }

        :root {
            --bg: #0b0d0b;
            --surface: #151915;
            --green: #3fdc85;
            --green-dim: #2a7a3a;
            --text: #b2c4b2;
            --text-dim: #5d685d;
            --btn: #1a1f1a;
            --btn-hover: #262e26;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "AliceHand", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 3rem 1rem;
            position: relative;
        }

        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, rgba(63,220,133,0.09), transparent 75%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
        }

        main {
            text-align: center;
            padding: 3rem 2rem;
            z-index: 3;
        }

        .brand {
            font-size: 5rem;
            color: var(--green);
            letter-spacing: -0.03em;
            text-transform: lowercase;
            filter: drop-shadow(0 0 18px rgba(63,220,133,0.25));
            margin-bottom: 1.2rem;
        }

        .status {
            font-size: 1.25rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .status::after {
            content: "";
            display: inline-block;
            width: 11px;
            height: 11px;
            background: var(--green-dim);
            border-radius: 50%;
            margin-left: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; }
        }

        .buttons {
            display: flex;
            gap: 1.6rem;
            justify-content: center;
            margin-bottom: 3.5rem;
        }

        .btn {
            background: var(--btn);
            color: var(--text);
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.25rem;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
        }

        footer {
            position: absolute;
            bottom: 2.5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.6;
            z-index: 3;
        }

        .credits {
            font-weight: 600;
            margin-bottom: 0.6rem;
            font-size: 1.1rem;
        }

        .links {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
            transition: color 0.2s ease, border-bottom 0.2s ease;
        }

        a:hover {
            color: var(--green);
            border-bottom: 1px solid var(--green);
        }

        @media (max-width: 600px) {
            .brand { font-size: 3.8rem; }
            .status { font-size: 1rem; }
            .btn { font-size: 1.1rem; padding: 0.9rem 1.6rem; }
        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>
    <div class="glow"></div>

    <main>
        <h1 class="brand">legu</h1>
        <p class="status">Site is being built, there isn't anything here rn</p>

        <div class="buttons">
            <a class="btn" href="/tools/index.html">Tools</a>
            <a class="btn" href="/jugar/index.html">Games</a>
            <a class="btn" href="https://jerjugar.zya.me">JerJugar</a>
        </div>
    </main>

    <footer>
        <div class="credits">Akon'Vess</div>
        <div class="links">
            <a href="https://github.com/cuteangryduck-stack" target="_blank" rel="noopener noreferrer">Github</a>
            <a href="mailto:cute.angryduck@gmail.com">Email</a>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");

        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        const particles = [];
        const count = 80;
        const mouse = { x: null, y: null };

        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                size: Math.random() * 2 + 1,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            });
        }

        document.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function draw() {
            ctx.clearRect(0, 0, w, h);

            ctx.fillStyle = "rgba(63,220,133,0.9)";
            ctx.shadowColor = "rgba(63,220,133,0.8)";
            ctx.shadowBlur = 8;

            for (let p of particles) {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 120) {
                    p.x += dx / dist * 0.6;
                    p.y += dy / dist * 0.6;
                }

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = w;
                if (p.x > w) p.x = 0;
                if (p.y < 0) p.y = h;
                if (p.y > h) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>

</body>
</html>
