<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 • Legu</title>
    <link rel="icon" href="https://legu.veho.com.au/legu-rs.png">

    <style>
        @font-face {
            font-family: "AliceHand";
            src: url("https://legu.veho.com.au/fonts/alicehandwriting.ttf") format("truetype");
        }

        :root {
            --bg: #0b0d0b;
            --green: #3fdc85;
            --green-dim: #2a7a3a;
            --text: #b2c4b2;
            --text-dim: #5d685d;
            --btn: #1a1f1a;
            --btn-hover: #262e26;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "AliceHand", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 3rem 1rem;
            position: relative;
        }

        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(63,220,133,0.1), transparent 75%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
        }

        main {
            text-align: center;
            padding: 3rem 2rem;
            z-index: 3;
        }

        .code {
            font-size: 7rem;
            color: var(--green);
            letter-spacing: -0.03em;
            filter: drop-shadow(0 0 20px rgba(63,220,133,0.3));
            margin-bottom: 1rem;
        }

        .msg {
            font-size: 1.5rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .btn {
            background: var(--btn);
            color: var(--text);
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.25rem;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
        }

        footer {
            position: absolute;
            bottom: 2.5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.6;
            z-index: 3;
        }

        @media (max-width: 600px) {
            .code { font-size: 5rem; }
            .msg { font-size: 1.1rem; }
            .btn { font-size: 1.1rem; padding: 0.9rem 1.6rem; }
        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>
    <div class="glow"></div>

    <main>
        <div class="code">404</div>
        <div class="msg">This page doesn't exist</div>
        <a class="btn" href="/">Return Home</a>
    </main>

    <footer>
        Akon'Vess • Legu
    </footer>

    <script>
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");

        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        const particles = [];
        const count = 90;
        const mouse = { x: null, y: null };

        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                size: Math.random() * 2 + 1,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            });
        }

        document.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function draw() {
            ctx.clearRect(0, 0, w, h);

            ctx.fillStyle = "rgba(63,220,133,0.9)";
            ctx.shadowColor = "rgba(63,220,133,0.8)";
            ctx.shadowBlur = 8;

            for (let p of particles) {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 130) {
                    p.x += dx / dist * 0.7;
                    p.y += dy / dist * 0.7;
                }

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = w;
                if (p.x > w) p.x = 0;
                if (p.y < 0) p.y = h;
                if (p.y > h) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>

</body>
</html>
